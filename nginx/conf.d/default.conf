# ═══════════════════════════════════════════════════════════════════════════════
#  Nginx — Virtual Host PepperImports
#  Proxy reverso: /api/* → backend | /* → frontend estático
# ═══════════════════════════════════════════════════════════════════════════════

# Upstream backend (nome do serviço Docker)
upstream backend_api {
    server backend:5139;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ── Segurança: Headers ────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:;" always;

    # ── Health check (nginx) ──────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── API: proxy para backend .NET ──────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        limit_conn addr 20;

        proxy_pass         http://backend_api;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # CORS gerenciado pelo backend — não duplicar aqui
    }

    # ── Login: rate limit mais restrito ──────────────────────────────────────
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;

        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── SignalR Hub ───────────────────────────────────────────────────────────
    location /hubs/ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;   # WebSocket: manter conexão longa
        proxy_send_timeout 86400s;
    }

    # ── Uploads/Imagens do backend ────────────────────────────────────────────
    location /uploads/ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;

        # Cache para imagens
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        expires 7d;
    }

    # ── Frontend React (SPA) ──────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Segurança: não indexar
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # ── Assets estáticos: cache longo ─────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        try_files $uri =404;
    }

    # ── Bloquear acesso a arquivos sensíveis ──────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ \.(env|json|lock|log|sh|sql)$ {
        deny all;
        return 404;
    }
}

